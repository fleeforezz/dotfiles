
#----- GENERAL SETTINGS -----#
# Use Ctrl + a as the prefix  (better than Ctrl + b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Better command delay
set -s escape-time 0

# Reload tmux config with: Ctrl + z + r
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

#----- MOUSE SUPPORT -----#
set -g mouse on

#----- SPLIT & WINDOWS -----#
unbind '"'
unbind %

# Split vertically: ` + q + v
bind v split-window -h

# Split horizontally: ` + q + h
bind h split-window -v

# Navigate panes with Alt + Arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

#----- STATUS CONFIG -----#
# Status position
set-option -g status-position top

#----- CATPPUCCIN CONFIG -----#
# Options to make tmux more pleasant
set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

#----- TPM (TMUX PLUGIN MANAGER) -----#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @plugin 'tmux-plugins/sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save
set -g @plugin 'tmux-plugins/tmux-yank'           # Better copy/paste
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Shows prefix status

# Init TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

